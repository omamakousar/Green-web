      body{

      margin:0;

      h1{
        color:green;

      button{
    background-color:darkgreen;

    border:none;
    border-radius:30px;
    padding:50px 80px;
    font-size:50px;
    font-weight:bold;
    cursor:pointer;
      }
      
      
      
      slider{
    position:relative;
    width:100%;
    max-width:90px;
    height:100px;
    margin:auto;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:15px;
    animation:carousel 15s infinite;
}

.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:3s;}
.slide:nth-child(3){animation-delay:6s;}
.slide:nth-child(4){animation-delay:9s;}
.slide:nth-child(5){animation-delay:12s;}

@keyframes carousel{
    0%{
        left:15%;
        transform:scale(1);
        opacity:1;
        z-index:3;
    }
    25%{
        left:55%;
        transform:scale(0.8);
        opacity:0.6;
    }
    50%{
        left:85%;
        transform:scale(0.6);
    }
    75%{
        left:-25%;
        transform:scale(0.6);
    }
    100%{
        left:15%;
        transform:scale(1);
        opacity:1;
        z-index:3;
    }
      }
nav{
    background-color:white;
    padding:15px 20px;

}

nav a{

    color:black;
    font-size:40px;

}
logo{
